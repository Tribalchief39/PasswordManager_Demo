<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassVault — Secure Password Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0D1B2A;
    --slate: #1B2B3D;
    --slate-light: #243447;
    --teal: #00C9A7;
    --teal-dim: #00a888;
    --teal-glow: rgba(0,201,167,0.15);
    --off-white: #E8EDF2;
    --muted: #7A8A9A;
    --danger: #FF5C5C;
    --warn: #FFB547;
    --card: #152130;
    --border: rgba(255,255,255,0.07);
    --font-ui: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body {
    font-family: var(--font-ui);
    background: var(--navy);
    color: var(--off-white);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--slate);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,201,167,0.015) 2px,
      rgba(0,201,167,0.015) 4px
    );
    pointer-events: none;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--teal);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-icon svg { width: 18px; height: 18px; }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--off-white);
  }

  .logo-text span { color: var(--teal); }

  .sidebar-section {
    padding: 18px 12px 8px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    margin: 1px 8px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.15s;
    position: relative;
  }

  .nav-item:hover { background: var(--slate-light); color: var(--off-white); }

  .nav-item.active {
    background: var(--teal-glow);
    color: var(--teal);
    border: 1px solid rgba(0,201,167,0.2);
  }

  .nav-item .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }

  .nav-badge {
    margin-left: auto;
    background: var(--teal);
    color: var(--navy);
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    font-family: var(--font-mono);
  }

  .nav-badge.red { background: var(--danger); color: white; }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px;
    border-top: 1px solid var(--border);
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .user-chip:hover { background: var(--slate-light); }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00C9A7, #0070f3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--muted); }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    background: var(--slate);
    flex-shrink: 0;
  }

  .page-title {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
  }

  .search-wrap {
    display: flex;
    align-items: center;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    gap: 8px;
    width: 260px;
    transition: border-color 0.15s;
  }

  .search-wrap:focus-within { border-color: var(--teal); }

  .search-wrap input {
    background: none;
    border: none;
    outline: none;
    color: var(--off-white);
    font-size: 13px;
    padding: 8px 0;
    width: 100%;
    font-family: var(--font-ui);
  }

  .search-wrap input::placeholder { color: var(--muted); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    font-family: var(--font-ui);
  }

  .btn-primary { background: var(--teal); color: var(--navy); }
  .btn-primary:hover { background: var(--teal-dim); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--slate-light); color: var(--off-white); border-color: rgba(255,255,255,0.15); }
  .btn-danger { background: rgba(255,92,92,0.15); color: var(--danger); border: 1px solid rgba(255,92,92,0.3); }
  .btn-danger:hover { background: rgba(255,92,92,0.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--slate-light); border-radius: 4px; }

  /* ── STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .stat-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .stat-value { font-size: 26px; font-weight: 700; font-family: var(--font-mono); color: var(--off-white); }
  .stat-value.teal { color: var(--teal); }
  .stat-value.warn { color: var(--warn); }
  .stat-value.danger { color: var(--danger); }

  /* ── FILTER ROW ── */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--muted);
    background: transparent;
    transition: all 0.15s;
    font-family: var(--font-ui);
  }

  .filter-chip:hover { border-color: rgba(255,255,255,0.2); color: var(--off-white); }
  .filter-chip.active { border-color: var(--teal); color: var(--teal); background: var(--teal-glow); }

  .ml-auto { margin-left: auto; }

  /* ── PASSWORD GRID ── */
  .pwd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .pwd-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .pwd-card:hover {
    border-color: rgba(0,201,167,0.3);
    background: var(--slate-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .pwd-card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }

  .site-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: var(--font-mono);
  }

  .pwd-meta { flex: 1; min-width: 0; }
  .pwd-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pwd-url { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-mono); }

  .pwd-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .pwd-card:hover .pwd-actions { opacity: 1; }

  .icon-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .icon-btn:hover { border-color: var(--teal); color: var(--teal); }
  .icon-btn svg { width: 13px; height: 13px; }

  .pwd-field {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--navy);
    border-radius: 6px;
    padding: 7px 10px;
    margin-bottom: 6px;
  }

  .pwd-field-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; width: 60px; flex-shrink: 0; }
  .pwd-field-value { font-size: 12px; font-family: var(--font-mono); color: var(--off-white); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pwd-field-value.hidden { color: var(--muted); letter-spacing: 3px; }

  .strength-bar {
    height: 3px;
    border-radius: 2px;
    margin-top: 10px;
    background: var(--navy);
    overflow: hidden;
  }

  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 8px;
    margin-right: 4px;
  }

  .tag-work { background: rgba(0,112,243,0.15); color: #4DA3FF; }
  .tag-personal { background: rgba(0,201,167,0.15); color: var(--teal); }
  .tag-social { background: rgba(255,181,71,0.15); color: var(--warn); }
  .tag-finance { background: rgba(255,92,92,0.15); color: var(--danger); }
  .tag-dev { background: rgba(167,139,250,0.15); color: #A78BFA; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--slate);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(12px);
    transition: transform 0.2s;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title { font-size: 16px; font-weight: 700; flex: 1; }

  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 16px 24px 20px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--border); }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 6px; }

  .form-input {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--off-white);
    font-size: 13.5px;
    font-family: var(--font-ui);
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--teal); }
  .form-input.mono { font-family: var(--font-mono); }

  .form-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .form-input-wrap .form-input { padding-right: 80px; }

  .input-actions {
    position: absolute;
    right: 8px;
    display: flex;
    gap: 4px;
  }

  /* strength meter */
  .strength-meter {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    align-items: center;
  }

  .strength-seg {
    height: 4px;
    flex: 1;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.3s;
  }

  .strength-label { font-size: 11px; color: var(--muted); margin-left: 8px; font-weight: 600; }

  /* ── TOAST ── */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 200;
  }

  .toast {
    background: var(--slate);
    border: 1px solid var(--border);
    border-left: 3px solid var(--teal);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--off-white);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: slideIn 0.2s ease;
    max-width: 300px;
  }

  .toast.error { border-left-color: var(--danger); }
  .toast.warn { border-left-color: var(--warn); }

  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state svg { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.4; display: block; }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--off-white); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }

  /* ── GENERATOR ── */
  .gen-output {
    background: var(--navy);
    border: 1px solid var(--teal);
    border-radius: 8px;
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 16px;
    color: var(--teal);
    word-break: break-all;
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 12px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gen-options { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

  .checkbox-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }

  .checkbox-wrap input { accent-color: var(--teal); cursor: pointer; }

  .range-wrap { margin-bottom: 12px; }
  .range-wrap label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; display: flex; justify-content: space-between; margin-bottom: 6px; }
  .range-wrap label span { color: var(--teal); font-family: var(--font-mono); }
  input[type=range] { width: 100%; accent-color: var(--teal); cursor: pointer; }

  /* section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title { font-size: 14px; font-weight: 600; color: var(--muted); }

  /* view toggle */
  .view-toggle { display: flex; gap: 2px; background: var(--navy); border-radius: 6px; padding: 2px; }
  .view-btn { padding: 5px 8px; border-radius: 4px; cursor: pointer; color: var(--muted); transition: all 0.15s; background: none; border: none; }
  .view-btn.active { background: var(--slate); color: var(--off-white); }
  .view-btn svg { width: 14px; height: 14px; display: block; }

  /* list view */
  .pwd-list { display: flex; flex-direction: column; gap: 4px; }

  .pwd-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .pwd-row:hover { border-color: rgba(0,201,167,0.3); background: var(--slate-light); }
  .pwd-row .pwd-actions { opacity: 0; }
  .pwd-row:hover .pwd-actions { opacity: 1; }
  .pwd-row-name { font-size: 13.5px; font-weight: 600; flex: 1; }
  .pwd-row-user { font-size: 12px; font-family: var(--font-mono); color: var(--muted); width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pwd-row-url { font-size: 12px; font-family: var(--font-mono); color: var(--muted); width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pwd-row-modified { font-size: 11px; color: var(--muted); width: 100px; text-align: right; }

  /* header for list */
  .list-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 14px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .list-header .h-name { flex: 1; }
  .list-header .h-user { width: 180px; }
  .list-header .h-url { width: 160px; }
  .list-header .h-mod { width: 100px; text-align: right; }
  .list-header .h-act { width: 68px; }

  /* scrollbar for modal */
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: var(--slate-light); border-radius: 4px; }

  /* Responsive */
  @media (max-width: 720px) {
    .sidebar { width: 56px; min-width: 56px; }
    .logo-text, .nav-item span, .user-info, .sidebar-section { display: none; }
    .nav-item { justify-content: center; }
    .nav-badge { display: none; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .pwd-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <span class="logo-text">Pass<span>Vault</span></span>
  </div>

  <div class="sidebar-section">Vault</div>

  <div class="nav-item active" onclick="switchView('passwords')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <span>All Passwords</span>
    <span class="nav-badge" id="total-badge">12</span>
  </div>

  <div class="nav-item" onclick="switchView('favorites')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>Favorites</span>
  </div>

  <div class="nav-item" onclick="switchView('shared')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>Shared with me</span>
    <span class="nav-badge">3</span>
  </div>

  <div class="sidebar-section">Security</div>

  <div class="nav-item" onclick="switchView('generator')">

function timeAgo(dateStr) {
  const d = new Date(dateStr), now = new Date();
  const days = Math.floor((now - d) / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  if (days < 30) return `${days}d ago`;
  if (days < 365) return `${Math.floor(days/30)}mo ago`;
  return `${Math.floor(days/365)}y ago`;
}

// ── PASSWORD STRENGTH ────────────────────────────────────────────────────
function calcStrength(pwd) {
  let score = 0;
  if (pwd.length >= 8) score++;
  if (pwd.length >= 14) score++;
  if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;
  if (score <= 1) return { level: 1, label: 'Weak', color: '#FF5C5C' };
  if (score <= 2) return { level: 2, label: 'Fair', color: '#FFB547' };
  if (score <= 3) return { level: 3, label: 'Good', color: '#00C9A7' };
  return { level: 4, label: 'Strong', color: '#00C9A7' };
}

function strengthBarHtml(pwd) {
  const { level, color } = calcStrength(pwd);
  const pct = (level / 4) * 100;
  return `<div class="strength-bar"><div class="strength-fill" style="width:${pct}%;background:${color}"></div></div>`;
}

function updateStrength() {
  const pwd = document.getElementById('f-pass').value;
  const segs = [document.getElementById('seg1'), document.getElementById('seg2'), document.getElementById('seg3'), document.getElementById('seg4')];
  const label = document.getElementById('strength-label');
  if (!pwd) { segs.forEach(s => s.style.background = ''); label.textContent = '—'; return; }
  const { level, label: lbl, color } = calcStrength(pwd);
  segs.forEach((s, i) => s.style.background = i < level ? color : '');
  label.textContent = lbl;
  label.style.color = color;
}

        <div class="icon-btn" onclick="event.stopPropagation();copyToClipboard(${p.id},'password')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
      </div>
    </div>
    ${strengthBarHtml(p.password)}
    ${tagHtml(p.category)}
  </div>`;
}

// ── GENERATOR VIEW ───────────────────────────────────────────────────────
let genOpts = { length: 18, upper: true, lower: true, numbers: true, symbols: true };
let genPwd = '';

function renderGenerator() {
  genPwd = generatePassword();
  document.getElementById('content').innerHTML = `
    <div style="max-width:520px;margin:0 auto">
      <div class="stat-card" style="margin-bottom:16px">
        <div class="stat-label" style="margin-bottom:12px">Generated Password</div>
        <div class="gen-output" id="gen-output">${genPwd}</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" style="flex:1" onclick="refreshGen()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.04"/></svg>
            Regenerate
          </button>
          <button class="btn btn-ghost" onclick="copyGen()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="btn btn-ghost" onclick="useGenPwd()">Use in New Entry</button>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label" style="margin-bottom:16px">Options</div>
        <div class="range-wrap">
          <label>Length <span id="len-val">${genOpts.length}</span></label>
          <input type="range" min="8" max="64" value="${genOpts.length}" oninput="genOpts.length=+this.value;document.getElementById('len-val').textContent=this.value;refreshGen()">
        </div>
        <div class="gen-options">
          <label class="checkbox-wrap"><input type="checkbox" ${genOpts.upper?'checked':''} onchange="genOpts.upper=this.checked;refreshGen()"> Uppercase (A–Z)</label>
          <label class="checkbox-wrap"><input type="checkbox" ${genOpts.lower?'checked':''} onchange="genOpts.lower=this.checked;refreshGen()"> Lowercase (a–z)</label>
          <label class="checkbox-wrap"><input type="checkbox" ${genOpts.numbers?'checked':''} onchange="genOpts.numbers=this.checked;refreshGen()"> Numbers (0–9)</label>
          <label class="checkbox-wrap"><input type="checkbox" ${genOpts.symbols?'checked':''} onchange="genOpts.symbols=this.checked;refreshGen()"> Symbols (!@#$…)</label>
        </div>
      </div>
    </div>`;
}

function generatePassword() {
  let chars = '';
  if (genOpts.upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (genOpts.lower) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (genOpts.numbers) chars += '0123456789';
  if (genOpts.symbols) chars += '!@#$%^&*()-_=+[]{}|;:,.<>?';
  if (!chars) chars = 'abcdefghijklmnopqrstuvwxyz';
  let pwd = '';
  for (let i = 0; i < genOpts.length; i++) pwd += chars[Math.floor(Math.random() * chars.length)];
  return pwd;
}

function refreshGen() {
  genPwd = generatePassword();
  const el = document.getElementById('gen-output');
  if (el) el.textContent = genPwd;
}

function copyGen() {
  navigator.clipboard.writeText(genPwd).catch(()=>{});
  toast('Password copied to clipboard!');
}

function useGenPwd() {
  openModal('add');
  setTimeout(() => {
    document.getElementById('f-pass').value = genPwd;
    updateStrength();
  }, 50);
}

function generateAndFill() {
  const pwd = generatePassword();
  document.getElementById('f-pass').value = pwd;
  document.getElementById('f-pass').type = 'text';
  updateStrength();
  setTimeout(() => { document.getElementById('f-pass').type = 'password'; }, 2000);
}

// ── AUDIT VIEW ───────────────────────────────────────────────────────────
function renderAudit() {
  const weak = passwords.filter(p => calcStrength(p.password).level <= 2);
  const pwds = passwords.map(p => p.password);
  const reused = passwords.filter(p => pwds.filter(x => x === p.password).length > 1);
  const old = passwords.filter(p => {
    const days = (new Date() - new Date(p.modified)) / 86400000;
    return days > 180;
  });

  document.getElementById('audit-badge').textContent = weak.length + reused.length;

  document.getElementById('content').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Weak Passwords</div><div class="stat-value danger">${weak.length}</div></div>
      <div class="stat-card"><div class="stat-label">Reused</div><div class="stat-value danger">${reused.length}</div></div>
      <div class="stat-card"><div class="stat-label">Not Updated 180d+</div><div class="stat-value warn">${old.length}</div></div>
      <div class="stat-card"><div class="stat-label">Security Score</div><div class="stat-value teal">${Math.round(((passwords.length - weak.length - reused.length) / passwords.length) * 100)}%</div></div>
    </div>
    ${weak.length ? `<div class="section-header"><span class="section-title">⚠ Weak Passwords</span></div><div class="pwd-list">${weak.map(p => auditRow(p, 'Weak', 'var(--danger)')).join('')}</div>` : ''}
    ${reused.length ? `<div class="section-header" style="margin-top:20px"><span class="section-title">⚠ Reused Passwords</span></div><div class="pwd-list">${reused.map(p => auditRow(p, 'Reused', 'var(--warn)')).join('')}</div>` : ''}
    ${old.length ? `<div class="section-header" style="margin-top:20px"><span class="section-title">⏰ Old Passwords</span></div><div class="pwd-list">${old.map(p => auditRow(p, 'Old', 'var(--warn)')).join('')}</div>` : ''}
    ${!weak.length && !reused.length && !old.length ? '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><h3>All clear!</h3><p>No security issues found.</p></div>' : ''}
  `;
}

function auditRow(p, label, color) {
  return `<div class="pwd-row" onclick="openModal('edit',${p.id})">
    <div class="site-icon" style="${iconStyle(p.category)};width:32px;height:32px;font-size:13px">${siteInitial(p.name)}</div>
    <div class="pwd-row-name">${p.name}</div>
    <div class="pwd-row-user">${p.username}</div>
    <div class="pwd-row-url" style="color:${color};font-weight:600">${label}</div>
    <div class="pwd-row-modified">${timeAgo(p.modified)}</div>
    <div class="pwd-actions">
      <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();openModal('edit',${p.id})">Fix Now</button>
    </div>
  </div>`;
}

// ── SHARED / GROUPS / SETTINGS ───────────────────────────────────────────

         {name:'Figma Team', url:'figma.com', sharedBy:'design@acme.com', category:'dev'}

          <div class="pwd-actions"><div class="icon-btn" title="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div></div>
        </div>`).join('')}

function renderGroups() {
  const groups = [
    { name: 'Engineering', members: 8, passwords: 24, color: '#A78BFA' },
    { name: 'Design', members: 4, passwords: 11, color: '#00C9A7' },

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

function renderSettings() {
  document.getElementById('content').innerHTML = `
    <div style="max-width:500px">
      <div class="stat-card" style="margin-bottom:12px">
        <div class="stat-label" style="margin-bottom:12px">Profile</div>

// ── MODAL ────────────────────────────────────────────────────────────────
function openModal(mode, id) {
  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');

  if (mode === 'add') {
    title.textContent = 'Add Password';
    clearForm();
    document.getElementById('edit-id').value = '';
  } else if (mode === 'edit') {
    const p = passwords.find(x => x.id === id);
    if (!p) return;
    title.textContent = 'Edit Password';
    document.getElementById('edit-id').value = p.id;
    document.getElementById('f-name').value = p.name;
    document.getElementById('f-url').value = p.url;
    document.getElementById('f-user').value = p.username;
    document.getElementById('f-pass').value = p.password;
    document.getElementById('f-category').value = p.category;
    document.getElementById('f-notes').value = p.notes || '';
    updateStrength();
  } else if (mode === 'view') {
    // open edit mode for simplicity
    openModal('edit', id);
    document.getElementById('modal-title').textContent = 'View / Edit Password';
    return;
  }

  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function clearForm() {
  ['f-name','f-url','f-user','f-pass','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-category').value = 'personal';
  updateStrength();
}

function savePassword() {
  const name = document.getElementById('f-name').value.trim();
  const url = document.getElementById('f-url').value.trim();
  const username = document.getElementById('f-user').value.trim();
  const password = document.getElementById('f-pass').value;
  const category = document.getElementById('f-category').value;
  const notes = document.getElementById('f-notes').value.trim();
  const editId = document.getElementById('edit-id').value;

  if (!name || !password) { toast('Name and password are required.', 'error'); return; }

  const today = new Date().toISOString().split('T')[0];

  if (editId) {
    const idx = passwords.findIndex(p => p.id === +editId);
    if (idx !== -1) {
      passwords[idx] = { ...passwords[idx], name, url, username, password, category, notes, modified: today };
      toast('Password updated.');
    }
  } else {
    passwords.push({ id: nextId++, name, url, username, password, category, notes, modified: today, favorite: false });
    toast('Password saved!');
  }

  closeModal();
  if (currentView === 'passwords') renderPasswords();
  else if (currentView === 'audit') renderAudit();
}

function deletePassword(id) {
  if (!confirm('Delete this password?')) return;
  passwords = passwords.filter(p => p.id !== id);
  renderPasswords();
  toast('Password deleted.', 'warn');
}

// ── REVEAL / COPY ─────────────────────────────────────────────────────────
function toggleReveal(id) {
  const el = document.getElementById(`pwdval-${id}`);
  if (!el) return;
  if (el.classList.contains('hidden')) {
    const p = passwords.find(x => x.id === id);
    el.textContent = p ? p.password : '';
    el.classList.remove('hidden');
    setTimeout(() => { el.textContent = '••••••••'; el.classList.add('hidden'); }, 5000);
  } else {
    el.textContent = '••••••••';
    el.classList.add('hidden');
  }
}

function copyToClipboard(id, field) {
  const p = passwords.find(x => x.id === id);
  if (!p) return;
  navigator.clipboard.writeText(p[field] || '').catch(() => {});
  toast(`${field.charAt(0).toUpperCase()+field.slice(1)} copied!`);
}

function togglePassVisible() {
  const f = document.getElementById('f-pass');
  f.type = f.type === 'password' ? 'text' : 'password';
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type === 'error' ? 'error' : type === 'warn' ? 'warn' : ''}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderPasswords();
</script>
